services:
  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy
    ports:
      -  9443:9443
volumes:
  portainer_data:

networks:
  proxy:
    name: zapserver_proxy
    external: true
